# ==============================================================================
# HYPRLAND CONFIGURATION FILE
# ==============================================================================

# Disable the autogenerated warning banner
autogenerated = 0

# ------------------------------------------------------------------------------
# 1. VARIABLES
# ------------------------------------------------------------------------------
$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = fuzzel

# ------------------------------------------------------------------------------
# 2. KEYBINDINGS
# ------------------------------------------------------------------------------
# Core applications
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, togglefloating,

# Exit Hyprland safely
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Monitors navigation
# Moves the window to the next monitor
bind = $mainMod SHIFT, period, movewindow, mon:+1
# Moves the window to the previous monitor
bind = $mainMod SHIFT, comma, movewindow, mon:-1

# --- Window Resizing & Moving ---
# Resize with keyboard (SUPER + ALT + Arrow Keys)
binde = $mainMod ALT, right, resizeactive, 30 0
binde = $mainMod ALT, left, resizeactive, -30 0
binde = $mainMod ALT, up, resizeactive, 0 -30
binde = $mainMod ALT, down, resizeactive, 0 30

# Resize and move with mouse
bindm = $mainMod, mouse:272, movewindow   # Hold SUPER + Left Click to move
bindm = $mainMod, mouse:273, resizewindow # Hold SUPER + Right Click to resize

# ------------------------------------------------------------------------------
# 3. INPUT SETTINGS
# ------------------------------------------------------------------------------
input {
    # Set keyboard layout to French AZERTY
    kb_layout = fr
}

# ------------------------------------------------------------------------------
# 4. SOURCE EXTERNAL CONFIGS
# ------------------------------------------------------------------------------
# Ambxst
source = ~/.local/share/ambxst/hyprland.conf

# ------------------------------------------------------------------------------
# 5. MONITORS (OVERRIDES)
# ------------------------------------------------------------------------------
# Down here you can write or source anything that you want to override from Ambxst's settings.

# Secondary Monitor (HDMI-A-1) on the LEFT at 144Hz
monitor = HDMI-A-1, 1920x1080@144, 0x0, 1

# Primary Monitor (DP-2) on the RIGHT at 144Hz
monitor = DP-2, 1920x1080@144, 1920x0, 1

# ------------------------------------------------------------------------------
# 6. AUTOSTART (EXEC-ONCE)
# ------------------------------------------------------------------------------
# System & Theming
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
env = QT_QPA_PLATFORMTHEME,qt5ct
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Applications
exec-once = discord --minimized &
exec-once = jetbrains-toolbox --tray &

# Screen sharing bridge for XWayland apps
exec-once = xwaylandvideobridge &

# ------------------------------------------------------------------------------
# 7. WINDOW RULES
# ------------------------------------------------------------------------------
# Rules to hide xwaylandvideobridge and keep it running silently in the background
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}
